name: "npm Install"
description: "Installs npm dependencies in a Spark Node container"
inputs:
  node:
    description: "The Node version to use"
    required: true
runs:
  using: "composite"
  steps:
    - name: Cache npm downloads
      uses: actions/cache@v4
      with:
        path: ${{ runner.temp }}/npm-cache
        key: npm-${{ inputs.node }}-${{ hashFiles('package.json', 'package-lock.json') }}
        restore-keys: npm-${{ inputs.node }}-
    - name: npm install
      run: |
        if [ -z "$NODE" ]; then
          echo "::error::The 'node' input is required, for example 20"
          exit 1
        fi
        mkdir -p "$NPM_CACHE_HOST"
        docker run --rm \
          --user "$(id -u):$(id -g)" \
          --volume "$GITHUB_WORKSPACE":/app \
          --volume "$NPM_CACHE_HOST":/tmp/npm-cache \
          --workdir /app \
          --env HOME=/tmp \
          --env npm_config_cache=/tmp/npm-cache \
          --entrypoint npm \
          "jalendport/spark-node:$NODE" \
          install \
          --no-fund
      shell: bash
      env:
        NODE: ${{ inputs.node }}
        NPM_CACHE_HOST: ${{ runner.temp }}/npm-cache
